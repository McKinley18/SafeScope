<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Shield (refined proportions) -->
  <g transform="translate(20,20)">
    <path d="M100 0 L180 30 L180 130 Q180 200 100 240 Q20 200 20 130 L20 30 Z"
          fill="#0F172A" stroke="#3B82F6" stroke-width="4"/>

    <!-- Radar arc -->
    <path d="M100 130 A50 50 0 0 1 150 90"
          stroke="#3B82F6" stroke-width="4" fill="none"/>

    <!-- Sweep line -->
    <line x1="100" y1="130" x2="145" y2="95"
          stroke="#3B82F6" stroke-width="5" stroke-linecap="round"/>

    <!-- Center point -->
    <circle cx="100" cy="130" r="4" fill="#3B82F6"/>
  </g>

  <!-- Divider -->
  <line x1="220" y1="30" x2="220" y2="230"
        stroke="#9CA3AF" stroke-width="2"/>

  <!-- Text -->
  <text x="260" y="120"
        font-size="64"
        font-family="Arial, sans-serif"
        fill="#0F172A"
        font-weight="700">
    SENTINEL
  </text>

  <text x="260" y="175"
        font-size="28"
        font-family="Arial, sans-serif"
        fill="#3B82F6"
        letter-spacing="4">
    SAFETY
  </text>

</svg>
